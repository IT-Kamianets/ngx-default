<header
	class="border-b border-[var(--c-border)] bg-[var(--c-bg-secondary)]/95 backdrop-blur supports-[backdrop-filter]:bg-[var(--c-bg-secondary)]/80"
>
	<div
		class="mx-auto flex min-h-16 w-full max-w-[var(--container)] items-center justify-between px-4 py-3 sm:px-6"
	>
		<a class="inline-flex items-center" routerLink="/" aria-label="Go to homepage">
			<img
				class="h-10 w-auto"
				alt="Project logo"
				ngSrc="logo.png"
				width="132"
				height="40"
				priority
			/>
		</a>

		<button
			type="button"
			class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-[var(--c-border)] bg-[var(--c-bg-primary)] text-[var(--c-text-secondary)] transition-colors duration-200 hover:bg-[var(--c-bg-tertiary)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[color:var(--c-primary)] focus-visible:ring-offset-2 focus-visible:ring-offset-[var(--c-bg-secondary)]"
			[attr.aria-label]="toggleLabel()"
			(click)="toggleMode()"
		>
			<span class="material-symbols-outlined text-[22px]" aria-hidden="true">
				{{ toggleIcon() }}
			</span>
		</button>
	</div>
</header>
